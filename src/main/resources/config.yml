# Performance — optional caches and optimizations that reduce CPU usage at the
# cost of very slightly delayed visibility updates (typically 1–2 extra ticks
# before a block or entity is revealed after rounding a corner).
#
# These optimizations only affect Line of Sight checks (modes 2 and 3).
# Proximity-only mode (mode 1) does not use raycasts or chunk scanning, so
# these settings have no effect when all services are set to mode 1.
#
# All three are enabled by default. Disable individual optimizations here if
# you notice unacceptable reveal delay on your server. Higher trace modes
# (e.g. blockTraceMode: 4) reduce the negative visual effects of these optimizations.
performance:

  # entityScanCache — merges the expensive getNearbyEntities() Bukkit call
  # across all entity services (entities, players, item frames) into a single
  # scan per player per server tick. Without this, each service makes its own
  # redundant scan.
  # Only relevant when entities are using LOS (mode 2 or 3).
  # Impact: significant CPU reduction on servers with many entities.
  # Side effect: none visible to players.
  entityScanCache: true

  # raycastCache — caches World.rayTraceBlocks() results for a short window
  # (6 ticks) keyed on player position (0.5-block granularity), look direction
  # (5° buckets), and target block. Avoids re-casting identical rays when the
  # player hasn't moved or turned significantly.
  # Only relevant when block entities, entities, or scan blocks use LOS
  # (mode 2 or 3).
  # Impact: large CPU reduction with higher trace modes (3 and 4). Minimal
  #         benefit with trace mode 1 (center only).
  # Side effect: blocks/entities may take 1–2 extra ticks to reveal after
  #              small movements. Least noticeable with trace mode 4.
  raycastCache: true

  # deltaTrackerSensitivity — controls how sensitive movement detection is
  # for skipping block and scan-block visibility checks on stationary players.
  # Block change events and item frame placement always force a re-check
  # regardless of this setting.
  # Only relevant when block entities or scan blocks use LOS (mode 2 or 3).
  #
  # 0 = disabled (never skip — always re-check every tick)
  # 1 = high sensitivity (skip only perfectly still players: >0.01 blocks / >0.5°)
  # 2 = normal (default — skip if moved <0.1 blocks / <2°)
  # 3 = low sensitivity (skip if moved <0.5 blocks / <5° — most aggressive savings)
  deltaTrackerSensitivity: 2




    
tpsGuard:
  enabled: true
  minTps: 18.5

permissions:
  bypass: "blindspot.bypass"

debug:
  verbose: false

# Auto-reload — automatically reloads the config when config.yml is modified.
# Useful with /blindspot performanceMonitor to see the impact of changes in
# real time without running /blindspot reload manually.
# A 1-second delay is applied after detecting a file change to ensure the
# file has finished saving before reading it.
autoReload: false