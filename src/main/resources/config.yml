# Global enabling of BlindSpot. Set to false to disable all features without uninstalling the plugin.
enabled: true





# World filtering controls which worlds BlindSpot is active in.
# Use the world's folder name (e.g. "world", "world_nether", "world_the_end").
# The overworld folder name matches level-name in server.properties (default: "world").
#
# include: [] (empty) = all worlds are protected.
# include: [world, world_nether] = ONLY these worlds are protected.
# exclude: [world_the_end] = these worlds are never protected (overrides include).
worlds:
  include: []
  exclude: []

blockEntities:
  enabled: true
  mode: 2                    # mode: 1 = Proximity (radius only), 2 = Line of Sight, 3 = Proximity OR LOS
  revealRadius: 12           # used by modes 1 and 3
  remaskWhenLeaving: true    # re-mask block entities when leaving reveal radius or LOS
  remaskDelay: 2             # seconds to wait before re-masking (debounce)
  losMaxRevealDistance: 128  # used by modes 2 and 3 (cap for LOS raycasts)

  # blockTraceMode controls how many points on the block are checked for LOS.
  # More points = more accurate when a block is partially exposed, but more raycasts.
  # 1 = center only, 2 = 6 face centers, 3 = 8 corners, 4 = 6 face centers + 8 corners
  blockTraceMode: 4

  # traceModeFallbackDistance — beyond this distance (in blocks) from the player,
  # blockTraceMode is forced to 1 (center only) to save CPU on distant checks.
  # Set to 0 to disable the fallback (always use the configured blockTraceMode).
  traceModeFallbackDistance: 32

  # tickPriority — entities within highPriorityRadius recheck at a faster tick rate.
  # Everything else keeps the normal 8-tick interval.
  # highPriorityInterval must be <= 8 (clamped automatically if higher).
  tickPriority:
    highPriorityRadius: 16     # blocks
    highPriorityInterval: 2    # ticks

  placeholders:
    CHEST: AIR
    TRAPPED_CHEST: AIR
    BARREL: AIR
    ENDER_CHEST: AIR
    HOPPER: AIR
