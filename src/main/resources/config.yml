entities:
  enabled: true
  mode: 2                    # mode: 1 = Proximity (radius only), 2 = Line of Sight, 3 = Proximity OR LOS
  revealRadius: 12           # used by modes 1 and 3
  remaskWhenLeaving: true    # re-hide entities when leaving reveal radius or LOS
  remaskDelay: 3             # seconds to wait before re-hiding (debounce)
  losMaxRevealDistance: 128  # used by modes 2 and 3 (cap for LOS raycasts)

  # requireCrouchToHide — controls stance-aware visibility for PLAYER entities.
  # When true, a player's stance (standing vs crouching) affects whether they
  # can be seen. See closeTrackingRadius below for distance-based tuning.
  # When false, all players follow the normal visibility mode regardless of stance.
  # Has no effect on non-player entity types.
  requireCrouchToHide: true

  # closeTrackingRadius — short-range distance (in blocks) within which a
  # standing player is always tracked by the client (their nametag will be
  # visible through walls). Beyond this radius, standing players require
  # LOS to be tracked (just like crouching players at any distance).
  #
  # Set to 0 to disable the distance gate — standing players are always
  # tracked at any range (legacy behaviour).
  #
  # Only used when requireCrouchToHide is true. Ignored otherwise.
  #
  # Example: with server tracking at 128 and closeTrackingRadius at 16,
  # you get true line-of-sight visibility at range while still letting
  # players hide underground from ESP/radar.
  closeTrackingRadius: 16
  
  # entityTraceMode controls how many points on the entity bounding box are checked.
  # More points = more accurate around corners, but more raycasts per entity.
  # 1 = center only, 2 = 6 face centers, 3 = 8 corners, 4 = 6 face centers + 8 corners
  entityTraceMode: 4

  # traceModeFallbackDistance — beyond this distance (in blocks) from the player,
  # entityTraceMode is forced to 1 (center only) to save CPU on distant checks.
  # Set to 0 to disable the fallback (always use the configured entityTraceMode).
  traceModeFallbackDistance: 32

  # tickPriority — entities within highPriorityRadius recheck at a faster tick rate.
  # Everything else keeps the normal 10-tick interval.
  # highPriorityInterval must be <= 10 (clamped automatically if higher).
  tickPriority:
    highPriorityRadius: 16     # blocks
    highPriorityInterval: 1    # ticks

  suppressTypes:
    - PLAYER
    - VILLAGER
    - IRON_GOLEM
    - ARMOR_STAND
    - ITEM_FRAME
