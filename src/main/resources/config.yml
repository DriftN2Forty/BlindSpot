# Scan Blocks — masks non-block-entity blocks (crafting tables, grindstones, etc.)
# that can't be discovered via Chunk.getTileEntities().
# Uses NMS palette scanning to efficiently locate these blocks in chunks.
# The palette check is O(1) per chunk section (16×16×16); only sections whose
# palette contains a target material are fully scanned.
#
# Requires Paper 1.20.5+ with Mojang mappings. If NMS reflection fails at
# startup a warning is logged and this feature is silently disabled.
scanBlocks:
  enabled: true
  mode: 2                    # mode: 1 = Proximity (radius only), 2 = Line of Sight, 3 = Proximity OR LOS
  revealRadius: 12           # used by modes 1 and 3
  remaskWhenLeaving: true    # re-mask blocks when leaving reveal radius or LOS
  remaskDelay: 2             # seconds to wait before re-masking (debounce)
  losMaxRevealDistance: 128  # used by modes 2 and 3 (cap for LOS raycasts)
  blockTraceMode: 4          # 1 = center, 2 = 6 face centers, 3 = 8 corners, 4 = faces + corners
  traceModeFallbackDistance: 32

  tickPriority:
    highPriorityRadius: 16     # blocks
    highPriorityInterval: 2    # ticks

  placeholders:
    BOOKSHELF: AIR
    CRAFTING_TABLE: AIR
    CARTOGRAPHY_TABLE: AIR
    COMPOSTER: AIR
    SMITHING_TABLE: AIR
    STONECUTTER: AIR
    GRINDSTONE: AIR
    LOOM: AIR
    ANVIL: AIR
    CHIPPED_ANVIL: AIR
    DAMAGED_ANVIL: AIR
    COMPOSTER: AIR
    TRIPWIRE_HOOK: AIR
    TRIPWIRE: AIR
    LEVER: AIR
    NETHER_PORTAL: AIR
  materials:
    - BOOKSHELF
    - CRAFTING_TABLE
    - CARTOGRAPHY_TABLE
    - COMPOSTER
    - SMITHING_TABLE
    - STONECUTTER
    - GRINDSTONE
    - LOOM
    - ANVIL
    - CHIPPED_ANVIL
    - DAMAGED_ANVIL
    - TRIPWIRE_HOOK
    - TRIPWIRE
    - LEVER
    - NETHER_PORTAL







# LOS Passthrough — allows raycasts to pass through certain block types.
# When a ray hits a passthrough material, it continues through instead of stopping.
# Only affects LOS checks (modes 2 and 3). Has no effect on proximity (mode 1).
#
# WARNING: Enabling this adds extra raycasts per visibility check (up to maxRetrace
# per target). On busy servers with many players and dense passthrough blocks this
# can measurably increase CPU usage. Start with a small maxRetrace and test.
losPassthrough:

  enableBlocks: true      # apply to block-entity LOS checks
  enableEntities: true    # apply to entity LOS checks

  maxRetrace: 5           # max passthrough re-traces per ray (caps runaway cost)

  materials:
